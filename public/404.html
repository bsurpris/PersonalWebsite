<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Brandon Surpris</title>
    <script>
      // GitHub Pages SPA fallback: redirect 404s to index.html, preserving the path
      // via a query string that index.html's script decodes back into history.
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
